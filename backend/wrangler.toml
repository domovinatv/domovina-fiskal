name = "fiskal-domovina-backend"
main = "src/index.ts"
compatibility_date = "2026-06-01"
# nodejs_compat: još nepotreban u fazi 0 (samo WebCrypto), ali fiksiran odmah jer
# faza 2 (ZKI: MD5 + RSA-SHA1 preko node:crypto) o njemu ovisi — vidi docs/knowledge/11-*.
compatibility_flags = ["nodejs_compat"]
account_id = "7dc7167b7e2e00923bfa7cd697df14e4"

# Custom Domain (NE plain route) — wrangler na deployu sam stvori proxied DNS
# zapis + edge certifikat za fiskal.domovina.ai (isti obrazac kao pipeline.domovina.ai).
[[routes]]
pattern = "fiskal.domovina.ai"
custom_domain = true

[observability]
enabled = true

# Cron: sweep naknadne dostave (fiskalni računi bez JIR-a → retry s NakDost=true).
# Rok po čl. 21. st. 2. NN 89/2025 je dva RADNA dana — 15-minutni sweep je unutar toga.
[triggers]
crons = ["*/15 * * * *"]

# Fontovi za PDF (DejaVu subset s HR dijakriticima) bundlaju se kao binarni podaci.
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

# Fina CA certifikati (trust anchori za CIS TLS preko subtls-a) kao tekst.
[[rules]]
type = "Text"
globs = ["**/*.pem"]
fallthrough = true

# Cloudflare Email Service — slanje dokumenata (racuni@domovina.ai).
# Preduvjet (jednom po accountu/zoni): `wrangler email sending enable domovina.ai`.
[[send_email]]
name = "EMAIL"

# D1 — kreiraj s: wrangler d1 create fiskal_domovina
# Zalijepi database_id koji ispiše komanda (placeholder radi samo za --local).
[[d1_databases]]
binding = "DB"
database_name = "fiskal_domovina"
database_id = "65077e4a-440e-4cfe-8ea3-fddcf421a237"
migrations_dir = "migrations"

[vars]
# Zadana okolina fiskalizacije za nove certifikate/poruke ('test' | 'prod').
# Glavni worker = PRODUKCIJA od 2026-07-17; test živi na [env.test] (fiskal-test).
OKOLINA = "prod"

# Dashboard SSO — dijeljeni GoTrue (domovina-api). JWT-ovi se verificiraju
# delegacijom na GET /auth/v1/user; anon key je PUBLIC-SAFE (isti je već u
# javnom pinka.io bundleu) — HS256 JWT_SECRET NIKAD ne ide ovamo.
SUPABASE_URL = "https://api.domovina.ai"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3OTExMTcxMywiZXhwIjo0OTMyNzExNzEzLCJyb2xlIjoiYW5vbiJ9.Q4Ef7xMc2dmjMyfJebPDyqNirnARZzMxTWe7i0dASPI"

# CORS origini za customer dashboard (CSV). Prod domena + lokalni razvoj.
DASHBOARD_ORIGIN = "https://fiskal-app.domovina.ai,https://domovina-fiskal-app.pages.dev,http://localhost:3000"

# Secrets — postavi s `wrangler secret put` (lokalno u .dev.vars):
#   ADMIN_USER      # Basic Auth user za /admin
#   ADMIN_PASS      # Basic Auth pass za /admin
#   ENC_MASTER_KEY  # 64 hex znaka (32 bajta) — KEK za envelope enkripciju certifikata
#   RESEND_API_KEY  # Resend fallback za slanje emailova (dok CF Email Sending nije aktiviran)
#   DOKU_SOFTWARE_API_TOKEN  # GUID naše integracije za doku eRačun API (isti za sve tenante;
#                            # per-tenant API-TOKEN se unosi u /admin i sprema enkriptiran)
#
# NAPOMENA (okoline): glavni worker = PRODUKCIJA (OKOLINA=prod), [env.test] dolje
# = TEST okruženje (fiskal-test.domovina.ai, zasebna D1, OKOLINA=test). Secrets za
# test: `wrangler secret put <IME> --env test` (test DOKU_SOFTWARE_API_TOKEN!).

# ═══════════════════ TEST OKRUŽENJE (fiskal-test.domovina.ai) ═══════════════════
# Deploy: `npx wrangler deploy --env test`. Wrangler env NE nasljeđuje vars/route/
# d1/triggere — sve je navedeno eksplicitno.

[env.test]
name = "fiskal-domovina-backend-test"

[[env.test.routes]]
pattern = "fiskal-test.domovina.ai"
custom_domain = true

[env.test.observability]
enabled = true

[env.test.triggers]
crons = ["*/15 * * * *"]

[[env.test.send_email]]
name = "EMAIL"

[[env.test.d1_databases]]
binding = "DB"
database_name = "fiskal_domovina_test"
database_id = "a5f88aa8-2725-49af-8e55-c97a7820f25a"
migrations_dir = "migrations"

[env.test.vars]
OKOLINA = "test"
SUPABASE_URL = "https://api.domovina.ai"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3OTExMTcxMywiZXhwIjo0OTMyNzExNzEzLCJyb2xlIjoiYW5vbiJ9.Q4Ef7xMc2dmjMyfJebPDyqNirnARZzMxTWe7i0dASPI"
DASHBOARD_ORIGIN = "https://fiskal-app-test.domovina.ai,https://domovina-fiskal-app-test.pages.dev,http://localhost:3000"
